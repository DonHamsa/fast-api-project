services:
  - type: web
    name: guessing-game
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_PATH
        value: /data/game.db
    disk:
      name: game-db
      mountPath: /data
      sizeGB: 1
